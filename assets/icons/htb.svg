<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Isometric Cube -->
  <g stroke="#9fef00" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 200 40
             L 260 75
             L 260 145
             L 200 180
             L 140 145
             L 140 75
             Z" />
    <path d="M 200 110 L 200 180
             M 200 110 L 140 75
             M 200 110 L 260 75" />
  </g>

  <!-- Logotype -->
  <text x="200" y="250" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="48" font-weight="900" letter-spacing="8" 
        text-anchor="middle" fill="currentColor">
    HACKTHEBOX
  </text>
</svg>
