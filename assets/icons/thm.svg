<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 110" fill="none">
  <!-- Cloud Outline -->
  <path d="M 52 64
           L 24 64
           C 8 64 8 44 24 44
           C 26 22 56 22 60 44
           C 72 44 76 60 66 64" 
        stroke="currentColor" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Falling Binary -->
  <g font-family="'Courier New', Courier, monospace" font-size="11" font-weight="800" fill="currentColor">
    <text x="58" y="58">10 10</text>
    <text x="58" y="70">1110</text>
    <text x="56" y="82">0101 01</text>
    <text x="58" y="94">01 010</text>
  </g>

  <!-- Try Hack Me Logotype -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="900" fill="currentColor">
    <text x="94" y="44">Try</text>
    <text x="94" y="72">Hack</text>
    <text x="94" y="100">Me</text>
  </g>
</svg>
