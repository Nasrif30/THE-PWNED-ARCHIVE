<body>

<div class="app-container">

    <!-- =============================================
         MOBILE HEADER (hidden on desktop)
    ============================================= -->

        <div style="display:flex; align-items:center; gap:10px;">

                    role="switch"
                    aria-checked="true"
                    style="position:relative; width:44px; height:26px; border-radius:13px;

                           transition:background var(--transition-smooth);">
            </button>
            <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Open navigation menu" aria-expanded="false">
                <svg width="18" height="14" viewBox="0 0 18 14" fill="none" aria-hidden="true">
                    <path d="M0 1h18M0 7h18M0 13h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

    <!-- =============================================
         SIDEBAR
    ============================================= -->

        <!-- Profile -->

            <div class="profile-pic-wrapper">

                <div class="profile-status" aria-label="Online status"></div>
            </div>
            <h1 class="profile-name" id="ui-name">Loading...</h1>
            <p class="handle" id="ui-handle">@loading</p>
            <p class="bio" id="ui-bio"></p>
        </div>

        <!-- Navigation -->
        <nav class="nav-menu" aria-label="Page navigation">
            <div class="nav-section-label">Navigate</div>

            <a href="#archive" class="nav-link active" data-route="archive" id="nav-archive" role="menuitem">
                <span class="nav-icon" aria-hidden="true">

        <!-- Sidebar Footer -->

            <p class="copyright">
                The Pwned Archive &copy; 2026<br>
                <span style="opacity: 0.6; font-size: 0.65rem;">Documenting the compromised.</span>
            </p>

    <!-- Desktop Theme Toggle (Top Right) -->
    <button id="theme-toggle-desktop" class="desktop-theme-toggle" aria-label="Toggle dark/light theme" role="switch" aria-checked="true">

    <!-- =============================================
         MAIN CONTENT
    ============================================= -->

    <!-- =============================================
         BOTTOM TAB BAR (mobile only)
    ============================================= -->

                    <polyline points="21 8 21 21 3 21 3 8"></polyline>

                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6"  y1="20" x2="6"  y2="14"></line>
                </svg>
                <span class="tab-label">Analytics</span>
            </button>
            <button class="tab-btn" data-route="profile" id="tab-profile" aria-label="Profile">

                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span class="tab-label">Profile</span>
            </button>
            <button class="tab-btn" id="tab-terminal" aria-label="Terminal">
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

                    <line x1="12" y1="19" x2="20" y2="19"></line>
                </svg>
                <span class="tab-label">Terminal</span>
            </button>

    <!-- =============================================
         TERMINAL (fixed floating panel)
    ============================================= -->
    <div class="terminal-container closed" id="terminal" role="region" aria-label="Command Terminal">
        <div class="terminal-header" id="terminal-header" aria-label="Terminal panel">
            <div class="terminal-dots" aria-hidden="true">
                <div class="terminal-dot red"></div>
                <div class="terminal-dot yellow"></div>
                <div class="terminal-dot green"></div>
            </div>
            <span class="terminal-title">user@pwned-archive — bash</span>
            <button class="terminal-close" id="terminal-close-btn" aria-label="Close terminal">
                <span class="terminal-close-esc">ESC</span>
                <span class="terminal-close-x">&times;</span>
            </button>
        </div>
        <div class="terminal-body">
            <div class="terminal-output" id="terminal-output">
                <div style="color: var(--accent-color); font-weight: 600;">
                    The Pwned Archive Terminal v1.0
                </div>
                <div style="color: var(--text-tertiary);">Type <span style="color:var(--accent-color)">help</span> for available commands.</div>
                <div style="height: var(--space-8);"></div>
            </div>
            <div class="terminal-input-line">
                <span class="prompt" aria-hidden="true">user@pwned-archive:~$</span>
                <input type="text"
                       id="terminal-input"
                       autocomplete="off"
                       spellcheck="false"
                       aria-label="Terminal input"
                       placeholder="">
            </div>
        </div>
    </div>

    <!-- Lightbox (injected dynamically) -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
        <button class="lightbox-close" id="lightbox-close" aria-label="Close image viewer">&times;</button>
        <img class="lightbox-img" id="lightbox-img" src="" alt="Screenshot">
        <div class="lightbox-nav">
            <button class="lightbox-btn" id="lightbox-prev" aria-label="Previous image">&#10094; Prev</button>
            <span id="lightbox-caption" aria-live="polite"></span>
            <button class="lightbox-btn" id="lightbox-next" aria-label="Next image">Next &#10095;</button>
        </div>
    </div>

</div>

<!-- =============================================
     JAVASCRIPT — Load order matters
============================================= -->
<script src="js/theme.js?v=1.3"></script>
<script src="js/router.js?v=1.3"></script>
<script src="js/profile.js?v=1.3"></script>
<script src="js/app.js?v=1.3"></script>

<script src="js/archive.js?v=1.3" defer></script>
<script src="js/analytics.js?v=1.3" defer></script>
<script src="js/charts.js?v=1.3" defer></script>
<script src="js/markdown.js?v=1.3" defer></script>
<script src="js/terminal.js?v=1.3" defer></script>
<script src="js/search.js?v=1.3" defer></script>
<script src="js/filters.js?v=1.3" defer></script>
<script src="js/gallery.js?v=1.3" defer></script>

<script>
    // Mobile sidebar toggle
    const menuBtn  = document.getElementById('mobile-menu-btn');
    const sidebar  = document.getElementById('sidebar');
    const overlay  = document.getElementById('sidebar-overlay');

    function openSidebar() {
        sidebar.classList.add('mobile-open');
        overlay.classList.add('visible');
        menuBtn.setAttribute('aria-expanded', 'true');
        document.body.style.overflow = 'hidden';
    }

    function closeSidebar() {
        sidebar.classList.remove('mobile-open');
        overlay.classList.remove('visible');
        menuBtn.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
    }

    menuBtn.addEventListener('click', () => {
        sidebar.classList.contains('mobile-open') ? closeSidebar() : openSidebar();
    });

    overlay.addEventListener('click', closeSidebar);

    // Close sidebar on nav link click (mobile)
    document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', () => {
            if (window.innerWidth <= 768) closeSidebar();
        });
    });

    // Bottom tab bar navigation
    document.querySelectorAll('.tab-btn[data-route]').forEach(btn => {
        btn.addEventListener('click', () => {
            window.location.hash = '#' + btn.dataset.route;
        });
    });

    // Tab terminal button
    const tabTerminalBtn = document.getElementById('tab-terminal');
    if (tabTerminalBtn) {
        tabTerminalBtn.addEventListener('click', () => {
            const term = document.getElementById('terminal');
            if (term) term.classList.toggle('closed');
        });
    }

    // Register Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
                .catch(() => {}); // Silent fail for local dev
        });
    }
</script>

</body>
</html>
